name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output_name: clawdeckx-linux-amd64
          - goos: linux
            goarch: arm64
            output_name: clawdeckx-linux-arm64
          - goos: windows
            goarch: amd64
            output_name: clawdeckx-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            output_name: clawdeckx-darwin-amd64
          - goos: darwin
            goarch: arm64
            output_name: clawdeckx-darwin-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build Frontend
        working-directory: web
        run: |
          echo "${{ github.run_number }}" > ../build.txt
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build Backend
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(node -p "require('./web/package.json').version" 2>/dev/null || echo "0.0.0")
          BUILD_NUM="${{ github.run_number }}"
          LDFLAGS="-s -w -X ClawDeckX/internal/version.Version=${VERSION} -X ClawDeckX/internal/version.Build=${BUILD_NUM}"
          go build -ldflags="${LDFLAGS}" -o dist/${{ matrix.output_name }} ./cmd/clawdeckx

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Build & Push Docker Image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download linux/amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: clawdeckx-linux-amd64
          path: dist/

      - name: Download linux/arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: clawdeckx-linux-arm64
          path: dist/

      - name: Prepare binaries for Docker
        run: |
          cp dist/clawdeckx-linux-amd64 clawdeckx-linux-amd64
          cp dist/clawdeckx-linux-arm64 clawdeckx-linux-arm64
          chmod +x clawdeckx-linux-amd64 clawdeckx-linux-arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64
          push: true
          build-args: TARGETARCH=amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx:${{ steps.version.outputs.VERSION }}-amd64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/arm64
          push: true
          build-args: TARGETARCH=arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx:${{ steps.version.outputs.VERSION }}-arm64

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO=${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          docker buildx imagetools create \
            --tag ${REPO}:${VERSION} \
            --tag ${REPO}:latest \
            ${REPO}:${VERSION}-amd64 \
            ${REPO}:${VERSION}-arm64

      - name: Sync README to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/clawdeckx
          readme-filepath: ./README.md
